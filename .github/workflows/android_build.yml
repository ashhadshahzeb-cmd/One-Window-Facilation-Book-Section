name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://lhnogjmeyqbuoiruykpw.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_t4svZ8krxb9VqkPA0epoDQ_s-av_vnE

      - name: Check Build Output
        run: ls -la dist

      - name: Capacitor Sync
        run: |
          npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kwsc-tracking-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
